<!DOCTYPE html>

<head>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

        header {
            background-color: #004466;
            color: white;
            padding: 1em;
            text-align: center;
        }
        main {
            padding: 2em;

            border: 1px solid #ccc;

            display: block;

                <option value="Afinidad">Afinidad</option>
                <option value="Vida">Vida</option>
                <option value="Apoyo">Apoyo</option>

            <label for="dia">Día:</label>
            <input type="text" id="dia" placeholder="Ej: Lunes, Miércoles">
            <button type="button" onclick="filtrarCasas()">Buscar</button>
        </form>
        <section id="resultado">
            <!-- Aquí se llenarán los resultados -->
            <div class="casa">
                <h3>Casa de Ejemplo</h3>
                <p>Tipo: Afinidad</p>
                <p>Día: Lunes</p>
                <p>Hora: 19:00</p>
                <p>Dirección: Calle Ficticia 123</p>
            </div>
            <!-- Puedes añadir más bloques de casas aquí o generarlos dinámicamente con JS -->
        </section>
        <iframe src="https://www.google.com/maps/d/u/1/embed?mid=1d309_TUY2N88Wg8znQ-PyfsUcg-5mr0&ehbc=2E312F&noprof=1" width="640" height="480"></iframe>
    </main>
</body>
